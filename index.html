<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title-tag">Word Pronunciation Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-8">
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 id="main-title" class="text-4xl font-bold text-indigo-900 tracking-tight flex items-center justify-center gap-3">
                <i data-lucide="volume-2" class="w-10 h-10 text-indigo-600"></i>
                <!-- Text injected by JS -->
            </h1>
            <p id="sub-title" class="text-slate-600"><!-- Text injected by JS --></p>
        </header>

        <!-- Input Section -->
        <section class="glass-effect rounded-2xl p-6 shadow-xl border border-white/20">
            <div class="space-y-4">
                <textarea 
                    id="wordInput" 
                    class="w-full h-32 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none text-lg"
                ></textarea>
                <div class="flex justify-between items-center gap-3">
                    <div id="actionButtons" class="hidden flex gap-2">
                        <button 
                            id="btn-speak-all"
                            onclick="speakAll()"
                            class="px-4 py-2 rounded-xl bg-emerald-50 text-emerald-600 hover:bg-emerald-100 transition-colors flex items-center gap-2 text-sm font-medium"
                        >
                            <i data-lucide="play" class="w-4 h-4"></i> <!-- Text injected by JS -->
                        </button>
                    </div>
                    <div class="flex gap-3 ml-auto">
                        <button 
                            id="btn-clear"
                            onclick="clearInput()"
                            class="px-6 py-2.5 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 transition-colors flex items-center gap-2"
                        >
                            <i data-lucide="trash-2" class="w-4 h-4"></i> <!-- Text injected by JS -->
                        </button>
                        <button 
                            id="btn-generate"
                            onclick="processWords()"
                            class="px-8 py-2.5 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all flex items-center gap-2"
                        >
                            <i data-lucide="play-circle" class="w-5 h-5"></i> <!-- Text injected by JS -->
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Results Section -->
        <div id="wordList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Words will be dynamically added here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-20 text-slate-400">
            <i data-lucide="book-open" class="w-16 h-16 mx-auto mb-4 opacity-20"></i>
            <p id="empty-text"><!-- Text injected by JS --></p>
        </div>
    </div>

    <script>
        // Use Unicode escape sequences to avoid any encoding issues in the file itself
        const I18N = {
            title: "\u5355\u8bcd\u6717\u8bfb\u52a9\u624b", // µĄ´ĘŔĘ¶ÁÖúĘÖ
            subtitle: "\u8f93\u5165\u7a7a\u683c\u5206\u9694\u7684\u5355\u8bcd\uff0c\u81ea\u52a8\u83b7\u53d6\u8bfb\u97f3\u53ca\u4f8b\u53e5", // ĘäČëżŐ¸ń·Ö¸ôµÄµĄ´ĘŁ¬×Ô¶Ż»ńČˇ¶ÁŇôĽ°Ŕýľä
            placeholder: "\u8bf7\u8f93\u5165\u5355\u8bcd\uff08\u5982: apple banana orange...\uff09", // ÇëĘäČëµĄ´ĘŁ¨Čç: apple banana orange...Ł©
            speakAll: "\u987a\u5e8f\u6717\u8bfb\u5168\u90e8", // ËłĐňŔĘ¶ÁČ«˛ż
            clear: "\u6e05\u7a7a", // ÇĺżŐ
            generate: "\u5f00\u59cb\u751f\u6210", // żŞĘĽÉúłÉ
            empty: "\u8f93\u5165\u5355\u8bcd\u540e\u70b9\u51fb\u201c\u5f00\u59cb\u751f\u6210\u201d", // ĘäČëµĄ´Ęşóµă»÷ˇ°żŞĘĽÉúłÉˇ±
            loading: "\u6b63\u5728\u83b7\u53d6\u5355\u8bcd\u4fe1\u606f...", // ŐýÔÚ»ńČˇµĄ´ĘĐĹĎ˘...
            noExample: "\u6682\u65e0\u4f8b\u53e5", // ÔÝÎŢŔýľä
            notFound: "\u672a\u627e\u5230\u8be5\u5355\u8bcd\u7684\u8be6\u7ec6\u4fe1\u606f", // Î´ŐŇµ˝¸ĂµĄ´ĘµÄĎęĎ¸ĐĹĎ˘
            speakWord: "\u6717\u8bfb\u5355\u8bcd", // ŔĘ¶ÁµĄ´Ę
            speakExample: "\u6717\u8bfb\u4f8b\u53e5" // ŔĘ¶ÁŔýľä
        };

        // Initialize UI Text
        document.getElementById('title-tag').textContent = I18N.title;
        document.getElementById('main-title').insertAdjacentText('beforeend', I18N.title);
        document.getElementById('sub-title').textContent = I18N.subtitle;
        document.getElementById('wordInput').placeholder = I18N.placeholder;
        document.getElementById('btn-speak-all').insertAdjacentText('beforeend', I18N.speakAll);
        document.getElementById('btn-clear').insertAdjacentText('beforeend', I18N.clear);
        document.getElementById('btn-generate').insertAdjacentText('beforeend', I18N.generate);
        document.getElementById('empty-text').textContent = I18N.empty;

        // Initialize Lucide icons
        lucide.createIcons();

        const wordInput = document.getElementById('wordInput');
        const wordList = document.getElementById('wordList');
        const emptyState = document.getElementById('emptyState');
        const actionButtons = document.getElementById('actionButtons');

        let currentResults = [];

        function clearInput() {
            wordInput.value = '';
            wordList.innerHTML = '';
            emptyState.classList.remove('hidden');
            actionButtons.classList.add('hidden');
            currentResults = [];
            window.speechSynthesis.cancel();
        }

        async function fetchWordData(word) {
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if (!response.ok) return null;
                const data = await response.json();
                return data[0];
            } catch (error) {
                console.error('Error fetching data for:', word, error);
                return null;
            }
        }

        function speak(text, lang = 'en-US') {
            return new Promise((resolve) => {
                if (!text) {
                    resolve();
                    return;
                }
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 0.9;
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                window.speechSynthesis.speak(utterance);
            });
        }

        function speakSingle(text) {
            window.speechSynthesis.cancel();
            speak(text);
        }

        async function speakAll() {
            window.speechSynthesis.cancel();
            for (const item of currentResults) {
                await speak(item.word);
                let example = '';
                if (item.data && item.data.meanings) {
                    for (const meaning of item.data.meanings) {
                        for (const def of meaning.definitions) {
                            if (def.example) {
                                example = def.example;
                                break;
                            }
                        }
                        if (example) break;
                    }
                }
                if (example) {
                    await new Promise(r => setTimeout(r, 500));
                    await speak(example);
                }
                await new Promise(r => setTimeout(r, 800));
            }
        }

        async function processWords() {
            const text = wordInput.value.trim();
            if (!text) return;

            const words = [...new Set(text.split(/\s+/).filter(w => w.length > 0))];
            if (words.length === 0) return;

            emptyState.classList.add('hidden');
            actionButtons.classList.add('hidden');
            wordList.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-12 space-y-4">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                    <p class="text-slate-500">${I18N.loading}</p>
                </div>
            `;

            const results = await Promise.all(words.map(async (word) => {
                const data = await fetchWordData(word);
                return { word, data };
            }));

            currentResults = results;
            wordList.innerHTML = '';
            
            results.forEach(({word, data}) => {
                const card = createWordCard(word, data);
                wordList.appendChild(card);
            });

            if (results.length > 0) {
                actionButtons.classList.remove('hidden');
            }

            lucide.createIcons();
        }

        function createWordCard(word, data) {
            const div = document.createElement('div');
            div.className = 'glass-effect rounded-2xl p-6 shadow-sm border border-slate-200/50 hover:shadow-md hover:border-indigo-200 transition-all duration-300 group';
            
            let phonetic = data?.phonetic || (data?.phonetics?.find(p => p.text)?.text) || '';
            let example = '';
            let definition = '';
            
            if (data && data.meanings) {
                for (const meaning of data.meanings) {
                    for (const def of meaning.definitions) {
                        if (!definition) definition = def.definition;
                        if (def.example) {
                            example = def.example;
                            break;
                        }
                    }
                    if (example) break;
                }
            }

            const hasData = !!data;

            div.innerHTML = `
                <div class="flex flex-col h-full space-y-4">
                    <div class="flex items-start justify-between">
                        <div class="space-y-1">
                            <h2 class="text-2xl font-bold text-slate-800 capitalize group-hover:text-indigo-600 transition-colors">${word}</h2>
                            <div class="flex items-center gap-2">
                                <span class="text-indigo-500 font-medium text-sm">${phonetic}</span>
                                <button onclick="speakSingle('${word}')" class="p-1.5 rounded-full hover:bg-indigo-50 text-indigo-400 hover:text-indigo-600 transition-all" title="${I18N.speakWord}">
                                    <i data-lucide="volume-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            ${example ? `
                                <button onclick="speakSingle(\`${example.replace(/'/g, "\\'")}\`)" 
                                    class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-100 transition-colors text-sm font-medium"
                                    title="${I18N.speakExample}">
                                    <i data-lucide="play" class="w-3.5 h-3.5"></i> ${I18N.speakExample}
                                </button>
                            ` : ''}
                        </div>
                    </div>

                    <div class="flex-grow space-y-3">
                        ${hasData ? `
                            <div class="space-y-2">
                                <p class="text-slate-600 text-sm line-clamp-2" title="${definition}">${definition}</p>
                                ${example ? `
                                    <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 italic text-slate-500 text-sm relative">
                                        <i data-lucide="quote" class="w-3 h-3 absolute -top-1.5 -left-1.5 text-slate-300"></i>
                                        "${example}"
                                    </div>
                                ` : `<p class="text-slate-400 text-xs italic">${I18N.noExample}</p>`}
                            </div>
                        ` : `
                            <div class="flex items-center gap-2 text-amber-500 text-sm bg-amber-50 p-3 rounded-xl border border-amber-100">
                                <i data-lucide="alert-circle" class="w-4 h-4"></i>
                                <span>${I18N.notFound}</span>
                            </div>
                        `}
                    </div>
                </div>
            `;
            return div;
        }
    </script>
</body>
</html>
